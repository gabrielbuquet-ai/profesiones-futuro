<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Pisos Aguado · Gestión de alquileres</title>
<link rel="stylesheet" href="css/pisos.css">
</head>
<body>

<!-- Banner de error global (se rellena desde JS si algo peta) -->
<div id="globalError" class="global-error" hidden></div>

<!-- ============== LOGIN GATE ============== -->
<div id="loginGate" class="login-gate">
  <div class="login-card">
    <div class="brand-block">
      <div class="brand-logo">A</div>
      <h1>Pisos Aguado</h1>
      <p class="brand-sub">Gestión de alquileres · Rent roll · Incidencias</p>
    </div>
    <button id="btnLogin" class="btn btn-primary btn-google">
      <svg width="18" height="18" viewBox="0 0 18 18" aria-hidden="true">
        <path fill="#4285F4" d="M17.64 9.2c0-.64-.06-1.25-.16-1.84H9v3.48h4.84a4.14 4.14 0 0 1-1.79 2.71v2.26h2.9c1.7-1.57 2.69-3.88 2.69-6.61z"/>
        <path fill="#34A853" d="M9 18c2.43 0 4.47-.8 5.96-2.18l-2.9-2.26c-.8.54-1.83.86-3.06.86-2.35 0-4.34-1.59-5.05-3.72H.96v2.33A9 9 0 0 0 9 18z"/>
        <path fill="#FBBC05" d="M3.95 10.7A5.41 5.41 0 0 1 3.66 9c0-.59.1-1.16.29-1.7V4.97H.96A9 9 0 0 0 0 9c0 1.45.35 2.82.96 4.03l2.99-2.33z"/>
        <path fill="#EA4335" d="M9 3.58c1.32 0 2.5.45 3.44 1.35l2.58-2.58A9 9 0 0 0 9 0 9 9 0 0 0 .96 4.97L3.95 7.3C4.66 5.17 6.65 3.58 9 3.58z"/>
      </svg>
      Entrar con Google
    </button>
    <p class="login-hint">Acceso restringido. Si no tienes permiso, contacta con Gabriel.</p>
  </div>
</div>

<!-- ============== APP SHELL ============== -->
<div id="appShell" hidden>
  <header class="topbar">
    <div class="brand">
      <div class="logo">A</div>
      <div>
        <div class="brand-title">Pisos Aguado</div>
        <div class="brand-sub">Rent roll · Incidencias · Alertas</div>
      </div>
    </div>
    <nav class="nav">
      <button data-view="dashboard" class="nav-btn active">Dashboard</button>
      <button data-view="rentroll"  class="nav-btn">Rent Roll</button>
      <button data-view="edificios" class="nav-btn">Edificios</button>
      <button data-view="inquilinos" class="nav-btn">Inquilinos</button>
      <button data-view="incidencias" class="nav-btn">Incidencias</button>
      <button data-view="tecnicos" class="nav-btn">Técnicos</button>
      <button data-view="proveedores" class="nav-btn">Proveedores</button>
      <button data-view="calendario" class="nav-btn">Calendario</button>
      <button data-view="ajustes" class="nav-btn">Ajustes</button>
    </nav>
    <div class="user-block">
      <span id="userName">—</span>
      <span id="userRole" class="role-badge">—</span>
      <button id="btnLogout" class="btn btn-ghost">Salir</button>
    </div>
  </header>

  <main id="app"></main>
</div>

<!-- ============== TEMPLATES ============== -->

<template id="tpl-dashboard">
  <section class="view view-dashboard">
    <div class="hero-row">
      <div>
        <h1>Hola <span data-bind="userName">—</span> 👋</h1>
        <p class="hero-sub">Estado actual del rent roll, alertas y acciones inmediatas.</p>
      </div>
      <div class="hero-actions">
        <button class="btn btn-secondary" id="btnExportIcs">📅 Exportar calendario .ics</button>
        <button class="btn btn-secondary" id="btnSendReminders">✉️ Enviar recordatorios</button>
      </div>
    </div>

    <div class="kpi-grid">
      <div class="kpi"><span class="kpi-label">Pisos activos</span><span class="kpi-value" id="kpiPisos">0</span></div>
      <div class="kpi"><span class="kpi-label">Renta mensual</span><span class="kpi-value" id="kpiRenta">0 €</span></div>
      <div class="kpi"><span class="kpi-label">Fees 10% mes</span><span class="kpi-value" id="kpiFees">0 €</span></div>
      <div class="kpi"><span class="kpi-label">Incidencias abiertas</span><span class="kpi-value" id="kpiIncidencias">0</span></div>
      <div class="kpi"><span class="kpi-label">Cobros pendientes</span><span class="kpi-value" id="kpiPendiente">0 €</span></div>
      <div class="kpi"><span class="kpi-label">Alertas activas</span><span class="kpi-value" id="kpiAlertas">0</span></div>
    </div>

    <div class="grid-2">
      <div class="card card-alerts">
        <h2>🚨 Alertas</h2>
        <p class="card-sub">Vencimientos, revisiones IPC y avisos críticos. Ordenados por urgencia.</p>
        <div id="alertList" class="alert-list"></div>
      </div>
      <div class="card">
        <h2>🔧 Incidencias abiertas</h2>
        <p class="card-sub">Por edificio. Click para ver detalle.</p>
        <div id="openIncidents" class="lead-list"></div>
      </div>
    </div>

    <div class="card">
      <h2>💸 Cobros pendientes a los Aguado</h2>
      <p class="card-sub">Materiales, reparaciones y otros gastos pendientes de cobrar al propietario.</p>
      <div id="pendingCharges"></div>
    </div>
  </section>
</template>

<template id="tpl-rentroll">
  <section class="view view-rentroll">
    <div class="view-head">
      <div>
        <h1>Rent Roll</h1>
        <p class="hero-sub">Contratos, fechas de firma, anexos, renovaciones, IPC y fees del 10%.</p>
      </div>
      <div class="view-actions">
        <select id="rrFilterEdificio" class="select"></select>
        <select id="rrFilterPropietario" class="select"></select>
        <select id="rrFilterEstado" class="select">
          <option value="">Todos los estados</option>
          <option value="activo">Activos</option>
          <option value="finalizado">Finalizados</option>
          <option value="renovado">Renovados</option>
        </select>
        <button class="btn btn-primary" id="btnNewContract">+ Nuevo contrato</button>
      </div>
    </div>

    <div class="table-wrap">
      <table class="table table-rentroll">
        <thead>
          <tr>
            <th>Piso</th>
            <th>Propietario</th>
            <th>Inquilino</th>
            <th>Firma</th>
            <th>Inicio</th>
            <th>Fin</th>
            <th>Renta €</th>
            <th>Fee 10% €</th>
            <th>Próx. IPC</th>
            <th>Estado</th>
            <th></th>
          </tr>
        </thead>
        <tbody id="rentrollBody"></tbody>
        <tfoot>
          <tr>
            <td colspan="6" class="totals-label">Totales</td>
            <td id="rrTotalRenta">0 €</td>
            <td id="rrTotalFee">0 €</td>
            <td colspan="3"></td>
          </tr>
        </tfoot>
      </table>
    </div>
  </section>
</template>

<template id="tpl-edificios">
  <section class="view">
    <div class="view-head">
      <div><h1>Edificios y pisos</h1><p class="hero-sub">Inmuebles gestionados.</p></div>
      <div class="view-actions">
        <button class="btn btn-secondary" id="btnNewEdificio">+ Edificio</button>
        <button class="btn btn-primary" id="btnNewPiso">+ Piso</button>
      </div>
    </div>
    <div id="edificiosList" class="cards-stack"></div>
  </section>
</template>

<template id="tpl-inquilinos">
  <section class="view">
    <div class="view-head">
      <div><h1>Inquilinos</h1><p class="hero-sub">Histórico y contactos.</p></div>
      <div class="view-actions">
        <button class="btn btn-primary" id="btnNewInquilino">+ Nuevo inquilino</button>
      </div>
    </div>
    <div class="table-wrap">
      <table class="table">
        <thead><tr><th>Nombre</th><th>DNI</th><th>Teléfono</th><th>Email</th><th>Contrato actual</th><th></th></tr></thead>
        <tbody id="inquilinosBody"></tbody>
      </table>
    </div>
  </section>
</template>

<template id="tpl-incidencias">
  <section class="view">
    <div class="view-head">
      <div><h1>Incidencias</h1><p class="hero-sub">Seguimiento de averías y reparaciones por edificio.</p></div>
      <div class="view-actions">
        <select id="incFilterEdificio" class="select"></select>
        <select id="incFilterEstado" class="select">
          <option value="">Todas</option>
          <option value="abierta">Abiertas</option>
          <option value="en_curso">En curso</option>
          <option value="resuelta">Resueltas</option>
        </select>
        <button class="btn btn-primary" id="btnNewIncidencia">+ Nueva incidencia</button>
      </div>
    </div>
    <div id="incidenciasList" class="cards-stack"></div>
  </section>
</template>

<template id="tpl-tecnicos">
  <section class="view">
    <div class="view-head">
      <div><h1>Técnicos</h1><p class="hero-sub">Personas de confianza para reparaciones.</p></div>
      <div class="view-actions">
        <button class="btn btn-primary" id="btnNewTecnico">+ Técnico</button>
      </div>
    </div>
    <div id="tecnicosList" class="cards-grid"></div>
  </section>
</template>

<template id="tpl-proveedores">
  <section class="view">
    <div class="view-head">
      <div><h1>Proveedores</h1><p class="hero-sub">Tiendas y suministradores.</p></div>
      <div class="view-actions">
        <button class="btn btn-primary" id="btnNewProveedor">+ Proveedor</button>
      </div>
    </div>
    <div id="proveedoresList" class="cards-grid"></div>
  </section>
</template>

<template id="tpl-calendario">
  <section class="view">
    <div class="view-head">
      <div><h1>Calendario</h1><p class="hero-sub">Fechas clave: vencimientos, revisiones IPC y renovaciones.</p></div>
      <div class="view-actions">
        <button class="btn btn-secondary" id="btnExportIcs2">📅 Exportar .ics</button>
      </div>
    </div>
    <div id="calendarList" class="timeline"></div>
  </section>
</template>

<template id="tpl-ajustes">
  <section class="view">
    <div class="view-head">
      <div><h1>Ajustes</h1><p class="hero-sub">Parámetros generales de la app.</p></div>
    </div>
    <div class="card">
      <h2>Comisión por gestión</h2>
      <label>% de comisión sobre renta mensual <input type="number" id="setFeePct" step="0.1" min="0" max="100"></label>
    </div>
    <div class="card">
      <h2>Avisos</h2>
      <label>Días de antelación vencimiento contrato <input type="number" id="setAvisoVencDias" min="1"></label>
      <label>Días de antelación revisión IPC <input type="number" id="setAvisoIpcDias" min="1"></label>
      <label>Email para recordatorios <input type="email" id="setEmailDestino" placeholder="gabriel@buquetabogados.com"></label>
    </div>
    <div class="card">
      <h2>Propietarios</h2>
      <p class="card-sub">Pedro, Estrella, Antonio y Bernardo Aguado. Email opcional para enviarles informes.</p>
      <div id="propietariosList"></div>
    </div>
    <div class="card">
      <h2>Permisos</h2>
      <p class="card-sub">Usuarios con acceso a la app. Solo el admin puede editar.</p>
      <div id="usuariosList"></div>
    </div>
    <div class="card">
      <button class="btn btn-secondary" id="btnSeed">Cargar datos iniciales (edificios + técnicos + MAGARCA)</button>
      <button class="btn btn-ghost" id="btnExportAll">Exportar todo (JSON)</button>
    </div>
  </section>
</template>

<!-- Modal genérico -->
<div id="modalRoot" class="modal-root" hidden>
  <div class="modal-backdrop" data-close></div>
  <div class="modal" id="modalContent"></div>
</div>

<div id="toastRoot" class="toast-root"></div>

<!-- ============== FIREBASE ============== -->
<script type="module">
  import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.0/firebase-app.js';
  import {
    getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged
  } from 'https://www.gstatic.com/firebasejs/11.6.0/firebase-auth.js';
  import {
    getFirestore, collection, doc, addDoc, setDoc, getDoc, getDocs, updateDoc, deleteDoc,
    query, where, orderBy, limit, onSnapshot, serverTimestamp, writeBatch
  } from 'https://www.gstatic.com/firebasejs/11.6.0/firebase-firestore.js';

  const firebaseConfig = {
    apiKey: "AIzaSyAa9lszzWttudNr_jTl2v8RsA4JfsQ83A0",
    authDomain: "profesiones-futuro.firebaseapp.com",
    projectId: "profesiones-futuro",
    storageBucket: "profesiones-futuro.firebasestorage.app",
  };

  try {
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    window.fb = {
      auth, db, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged,
      collection, doc, addDoc, setDoc, getDoc, getDocs, updateDoc, deleteDoc,
      query, where, orderBy, limit, onSnapshot, serverTimestamp, writeBatch
    };
    window.dispatchEvent(new Event('fb-ready'));
  } catch (e) {
    console.error('Firebase init error', e);
    const g = document.getElementById('globalError');
    if (g) {
      g.hidden = false;
      g.textContent = 'Error al inicializar Firebase: ' + (e.message || e) + '. Revisa la consola del navegador.';
    }
  }
</script>

<script>
  // Captura errores JS no manejados y los muestra en pantalla.
  window.addEventListener('error', function(ev){
    var g = document.getElementById('globalError');
    if (!g) return;
    g.hidden = false;
    g.textContent = 'Error JS: ' + (ev.message || ev.error) + ' (' + (ev.filename || '') + ':' + (ev.lineno || '') + ')';
  });
  window.addEventListener('unhandledrejection', function(ev){
    var g = document.getElementById('globalError');
    if (!g) return;
    g.hidden = false;
    g.textContent = 'Promesa rechazada: ' + (ev.reason && ev.reason.message ? ev.reason.message : ev.reason);
  });
</script>

<script src="js/store.js"></script>
<script src="js/alerts.js"></script>
<script src="js/ics.js"></script>
<script src="js/templates.js"></script>
<script src="js/views.js"></script>
<script src="js/seed.js"></script>
<script src="js/app.js"></script>

</body>
</html>
